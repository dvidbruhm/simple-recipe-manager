<!DOCTYPE html>
<html lang="en" data-theme="{{ theme | default('auto') }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title | default('recipes') }} · recipes</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header class="site-header">
    <a href="/recipes" class="logo">recipes</a>
    {% block header_extra %}{% endblock %}
    <span class="theme-toggle" aria-label="Toggle theme">☀/🌙</span>
  </header>
  <main class="site-main">
    {% block content %}{{ body_content | safe }}{% endblock %}
  </main>
</body>
</html>
