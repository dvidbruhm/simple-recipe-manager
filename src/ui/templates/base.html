<!DOCTYPE html>
<html lang="en" data-theme="{{ theme | default('auto') }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title | default('recipes') }} · recipes</title>
  <link rel="stylesheet" href="/static/app.css">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#5a7a4f">
</head>
<body>
  <header class="site-header">
    <a href="/recipes" class="logo">recipes</a>
    {% block header_extra %}{% endblock %}
    <form method="post" action="/theme" class="theme-form">
      <input type="hidden" name="theme" value="{{ next_theme | default('dark') }}">
      <button type="submit" class="theme-toggle" aria-label="Toggle theme">{{ theme_icon | default('☀') }}</button>
    </form>
  </header>
  <main class="site-main">
    {% block content %}{{ body_content | safe }}{% endblock %}
  </main>
  <script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("/sw.js").catch(() => {});
    });
  }
  </script>
</body>
</html>
