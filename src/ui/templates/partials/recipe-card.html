<a href="/recipes/{{ r.id }}" class="card block rounded border border-[color:var(--color-border)] bg-[color:var(--color-surface)] overflow-hidden no-underline hover:border-[color:var(--color-accent)]">
  {% if r.image_filename %}
    <img src="/static/images/{{ r.image_filename }}" alt="{{ r.title }}" loading="lazy" class="block w-full h-40 object-cover">
  {% else %}
    <div class="placeholder flex items-center justify-center h-40 text-[color:var(--color-muted)] text-sm">no image</div>
  {% endif %}
  <div class="card-body p-3">
    <div class="card-title font-medium text-[color:var(--color-text)] truncate">{{ r.title }}</div>
    <div class="card-meta flex items-center justify-between text-xs text-[color:var(--color-muted)] mt-1">
      <span class="truncate">{{ domain(r.source_url) }}</span>
      <span class="stars whitespace-nowrap">{{ stars(r.rating) | safe }}</span>
    </div>
  </div>
</a>
