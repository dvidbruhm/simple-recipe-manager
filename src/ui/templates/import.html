{% extends "base.html" %}

{% block content %}
<section class="import-page max-w-xl mx-auto px-4">
  <h1 class="text-2xl font-bold mb-4 text-[color:var(--color-text)]">Import a recipe</h1>
  <form action="/recipes/import" method="post" class="import-form space-y-3">
    <label class="block">
      <span class="block text-sm font-medium text-[color:var(--color-text)] mb-1">URL</span>
      <input type="url" name="url" required autofocus placeholder="https://www.marmiton.org/..." class="w-full px-3 py-2 rounded border border-[color:var(--color-border)] bg-[color:var(--color-bg)] text-[color:var(--color-text)]">
    </label>
    <button type="submit" class="btn px-4 py-2 rounded bg-[color:var(--color-accent)] text-white">Import</button>
  </form>
  <p class="hint mt-4 text-sm text-[color:var(--color-muted)]">Paste a recipe URL. The app will try to extract ingredients, steps, and image automatically. If the site blocks automated requests, you'll be asked to paste the page source instead.</p>
</section>
{% endblock %}
